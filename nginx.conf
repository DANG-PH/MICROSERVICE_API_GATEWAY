user nginx;
worker_processes auto;

error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    # API
    server {
        listen 80;
        server_name api.chienbinhrongthieng.online api.dangpham.id.vn;
        return 301 https://$host$request_uri;
    }
    server {
        listen 443 ssl;
        server_name api.chienbinhrongthieng.online api.dangpham.id.vn;
        ssl_certificate /etc/letsencrypt/live/api.chienbinhrongthieng.online/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.chienbinhrongthieng.online/privkey.pem;

        # khóa root
        location = / {
            auth_basic "Restricted";
            auth_basic_user_file /etc/nginx/.htpasswd;
            proxy_pass http://127.0.0.1:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # khóa swagger
        location /api-docs {
            # allow 123.123.123.123;  # IP văn phòng/team, có thể thêm sau ( tailscale, wireguard, ... )
            # deny all;       
            auth_basic "Restricted";
            auth_basic_user_file /etc/nginx/.htpasswd;
            proxy_pass http://127.0.0.1:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # còn lại bình thường
        location / {
            proxy_pass http://127.0.0.1:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
    }

    # PAY
    server {
        listen 80;
        server_name pay.chienbinhrongthieng.online pay.dangpham.id.vn;
        return 301 https://$host$request_uri;
    }
    server {
        listen 443 ssl;
        server_name pay.chienbinhrongthieng.online pay.dangpham.id.vn;
        ssl_certificate /etc/letsencrypt/live/api.chienbinhrongthieng.online/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.chienbinhrongthieng.online/privkey.pem;
        location / {
            proxy_pass http://127.0.0.1:3005;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
    }

    # DATA
    server {
        listen 80;
        server_name data.chienbinhrongthieng.online data.dangpham.id.vn;
        return 301 https://$host$request_uri;
    }
    server {
        listen 443 ssl;
        server_name data.chienbinhrongthieng.online data.dangpham.id.vn;
        ssl_certificate /etc/letsencrypt/live/api.chienbinhrongthieng.online/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.chienbinhrongthieng.online/privkey.pem;
        location / {
            proxy_pass http://127.0.0.1:8081;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header Cookie $http_cookie;
            proxy_set_header Origin $http_origin;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_read_timeout 300;
            proxy_connect_timeout 300;
            proxy_send_timeout 300;
        }
    }

    # REDIS
    server {
        listen 80;
        server_name redis.chienbinhrongthieng.online redis.dangpham.id.vn;
        return 301 https://$host$request_uri;
    }
    server {
        listen 443 ssl;
        server_name redis.chienbinhrongthieng.online redis.dangpham.id.vn;
        ssl_certificate /etc/letsencrypt/live/api.chienbinhrongthieng.online/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.chienbinhrongthieng.online/privkey.pem;
        auth_basic "Bạn cần có quyền truy cập";
        auth_basic_user_file /etc/nginx/.htpasswd;
        location / {
            proxy_pass http://127.0.0.1:5540;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header Cookie $http_cookie;
            proxy_set_header Origin $http_origin;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_read_timeout 300;
            proxy_connect_timeout 300;
            proxy_send_timeout 300;
        }
    }
}

