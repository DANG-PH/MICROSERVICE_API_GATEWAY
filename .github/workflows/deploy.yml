name: Deploy VPS

on:
  push:
    branches:
      - master

# concurrency:
#   group: deploy-vps # đặt tên nhóm, GitHub sẽ gom tất cả workflow có cùng tên group lại, dù khác repo cũng xếp hàng chờ nhau
#   cancel-in-progress: false # khi có workflow đang chạy, cái mới vào chờ, không hủy cái đang chạy

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # - name: Checkout code
      #   uses: actions/checkout@v3

      # - name: Run Tests
      #   run: |
      #     npm install
      #     npm run test

      # - name: Backup ENV
      #   uses: appleboy/ssh-action@v1.0.0
      #   with:
      #     host: ${{ secrets.HOST }}
      #     username: ${{ secrets.USERNAME }}
      #     key: ${{ secrets.SSH_KEY }}
      #     script: |
      #       mkdir -p /root/backup
      #       cp /root/MICROSERVICE_API_GATEWAY/.env /root/backup/.env.$(date +%Y%m%d%H%M%S)
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Generate Dependency Graph
        run: |
          GENERATE_GRAPH=true node dist/src/main.js > graph.mmd

      - name: Upload Graph Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dependency-graph
          path: graph.mmd

      # - name: Verify Graph Generated
      #   run: |
      #     test -s graph.mmd || (echo "Graph empty" && exit 1)

      - name: Install Mermaid CLI
        run: npm install -g @mermaid-js/mermaid-cli

      - name: Install Chromium deps
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser

      - name: Convert Graph to PNG
        run: |
          mmdc -i graph.mmd -o graph.png -s 2 -p /usr/bin/chromium

      - name: Send Graph to Telegram
        if: success()
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendPhoto \
            -F chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -F photo=@graph.png \
            -F caption="📊 Dependency Graph%0ARepo: ${{ github.repository }}%0ABranch: ${{ github.ref_name }}%0ACommit: ${{ github.sha }}"

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /root/MICROSERVICE_API_GATEWAY
            PREV_COMMIT=$(git rev-parse HEAD)
            echo $PREV_COMMIT > /tmp/prev_commit.txt
            pm2 stop api-gateway
            git fetch origin
            git checkout ${{ github.sha }}
            npm install
            npm run build
            pm2 restart api-gateway

      - name: Health Check & Rollback
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            echo "Waiting for service to start..."
            MAX_RETRIES=12
            RETRY_INTERVAL=5

            for i in $(seq 1 $MAX_RETRIES); do
              echo "Health check attempt $i/$MAX_RETRIES..."
              if curl -sf http://localhost:3000/health; then
                echo "Health check passed"
                exit 0
              fi
              echo "Not ready yet, waiting ${RETRY_INTERVAL}s..."
              sleep $RETRY_INTERVAL
            done

            echo "Health check failed after $((MAX_RETRIES * RETRY_INTERVAL))s, rolling back..."
            cd /root/MICROSERVICE_API_GATEWAY
            PREV_COMMIT=$(cat /tmp/prev_commit.txt)
            git checkout $PREV_COMMIT
            npm install
            npm run build
            pm2 restart api-gateway
            exit 1

      - name: Notify Telegram Success
        if: success()
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d text="✅ CI/CD SUCCESS%0ARepo: ${{ github.repository }}%0ABranch: ${{ github.ref_name }}%0ACommit: ${{ github.sha }}%0AMessage: ${{ github.event.head_commit.message }}%0ADeployed by: ${{ github.actor }}"

      - name: Notify Telegram Failure
        if: failure()
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d text="❌ CI/CD FAILED%0ARepo: ${{ github.repository }}%0ABranch: ${{ github.ref_name }}%0ACommit: ${{ github.sha }}%0AMessage: ${{ github.event.head_commit.message }}%0ADeployed by: ${{ github.actor }}"
